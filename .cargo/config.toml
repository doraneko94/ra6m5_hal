[build]
target = "thumbv8m.main-none-eabihf"

[target.thumbv8m.main-none-eabihf]
runner = [
    "probe-rs", 
    "run", 
    "--chip", "R7FA6M5BH",
    "--protocol", "swd", 
    "--speed", "1000", 
    "--connect-under-reset",
    "--log-format", "{t} {L} {s}"
]
rustflags = [
    "-C", "link-arg=-Tlink.x",
    "-C", "link-arg=-Tdefmt.x",
]

[env]
DEFMT_LOG = "trace"